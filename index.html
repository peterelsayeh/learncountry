<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Europe Country Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #ddeeff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }

  #top-bar { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 860px; position: relative; margin-bottom: 4px; }
  h1 { font-size: 28px; font-weight: 900; color: #1a3a5c; letter-spacing: -0.5px; text-align: center; flex: 1; }

  #lang-btn {
    position: absolute; right: 0;
    background: #fff; border: 2px solid #cde; border-radius: 50px;
    padding: 6px 14px; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 800; cursor: pointer; color: #1a3a5c;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10); transition: background 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  #lang-btn:hover { background: #eef6ff; }

  #prompt-box {
    background: #fff; border-radius: 50px; display: inline-flex; align-items: center;
    gap: 10px; padding: 10px 28px; font-size: 20px; font-weight: 900;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12); margin: 10px 0; color: #1a3a5c;
  }
  #flag-el { font-size: 30px; line-height: 1; }
  #country-el { font-size: 22px; }

  #scores { display: flex; gap: 20px; margin: 6px 0 4px; }
  .score { background: #fff; border-radius: 12px; padding: 6px 16px; font-size: 14px; font-weight: 700; color: #555; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .score b { color: #1a3a5c; font-size: 18px; }

  #feedback { min-height: 26px; font-size: 16px; font-weight: 800; margin: 4px 0; text-align: center; }
  .ok { color: #2e7d32; } .no { color: #c62828; }

  #map-wrap { background: #b8d8f0; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 30px rgba(0,0,0,0.15); width: 100%; max-width: 860px; }
  svg { width: 100%; height: auto; display: block; cursor: crosshair; }
  .country { fill: #5b9fcf; stroke: #fff; stroke-width: 0.5; transition: fill 0.15s; cursor: pointer; }
  .country:hover { fill: #3a7fbf; }
  .country.found { fill: #66bb6a !important; cursor: default; }
  .country.wrong-flash { fill: #ef5350 !important; }

  #next-btn {
    display: none; margin-top: 12px; padding: 10px 32px; background: #1a3a5c;
    color: #fff; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: background 0.15s;
  }
  #next-btn:hover { background: #2a5a8c; }
  #loading { color: #1a3a5c; font-weight: 700; font-size: 16px; padding: 40px; text-align: center; }
</style>
</head>
<body>

<div id="top-bar">
  <h1 id="title">🌍 Europe Explorer</h1>
  <button id="lang-btn" onclick="toggleLang()">
    <span id="lang-flag">🇸🇪</span><span id="lang-label">Svenska</span>
  </button>
</div>

<div id="prompt-box">
  <span id="flag-el">🏳️</span>
  <span id="find-label">Find:</span>
  <span id="country-el">Loading…</span>
</div>

<div id="scores">
  <div class="score"><span id="lbl-correct">✅ Correct:</span> <b id="sc">0</b></div>
  <div class="score"><span id="lbl-attempts">🎯 Attempts:</span> <b id="sa">0</b></div>
  <div class="score"><span id="lbl-streak">🔥 Streak:</span> <b id="ss">0</b></div>
</div>

<div id="feedback"></div>
<div id="map-wrap"><div id="loading">Loading map…</div></div>
<button id="next-btn" onclick="nextCountry()">Next Country →</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>

const EUROPE_COUNTRIES = {
  "008":"Albania","040":"Austria","112":"Belarus","056":"Belgium",
  "070":"Bosnia and Herzegovina","100":"Bulgaria","191":"Croatia","196":"Cyprus",
  "203":"Czech Republic","208":"Denmark","233":"Estonia","246":"Finland","250":"France",
  "276":"Germany","300":"Greece","348":"Hungary","352":"Iceland","372":"Ireland",
  "380":"Italy","428":"Latvia","440":"Lithuania","442":"Luxembourg",
  "470":"Malta","498":"Moldova","499":"Montenegro","528":"Netherlands",
  "807":"North Macedonia","578":"Norway","616":"Poland","620":"Portugal","642":"Romania",
  "643":"Russia","688":"Serbia","703":"Slovakia","705":"Slovenia",
  "724":"Spain","752":"Sweden","756":"Switzerland","804":"Ukraine","826":"United Kingdom",
  "383":"Kosovo"
};

const SV = {
  "Albania":"Albanien","Austria":"Österrike","Belarus":"Vitryssland",
  "Belgium":"Belgien","Bosnia and Herzegovina":"Bosnien och Hercegovina","Bulgaria":"Bulgarien",
  "Croatia":"Kroatien","Cyprus":"Cypern","Czech Republic":"Tjeckien","Denmark":"Danmark",
  "Estonia":"Estland","Finland":"Finland","France":"Frankrike","Germany":"Tyskland",
  "Greece":"Grekland","Hungary":"Ungern","Iceland":"Island","Ireland":"Irland",
  "Italy":"Italien","Latvia":"Lettland","Lithuania":"Litauen",
  "Luxembourg":"Luxemburg","Malta":"Malta","Moldova":"Moldavien",
  "Montenegro":"Montenegro","Netherlands":"Nederländerna","North Macedonia":"Nordmakedonien",
  "Norway":"Norge","Poland":"Polen","Portugal":"Portugal","Romania":"Rumänien",
  "Russia":"Ryssland","Serbia":"Serbien","Slovakia":"Slovakien",
  "Slovenia":"Slovenien","Spain":"Spanien","Sweden":"Sverige","Switzerland":"Schweiz",
  "Ukraine":"Ukraina","United Kingdom":"Storbritannien","Kosovo":"Kosovo"
};

const FLAGS = {
  "Albania":"🇦🇱","Austria":"🇦🇹","Belarus":"🇧🇾","Belgium":"🇧🇪",
  "Bosnia and Herzegovina":"🇧🇦","Bulgaria":"🇧🇬","Croatia":"🇭🇷","Cyprus":"🇨🇾",
  "Czech Republic":"🇨🇿","Denmark":"🇩🇰","Estonia":"🇪🇪","Finland":"🇫🇮","France":"🇫🇷",
  "Germany":"🇩🇪","Greece":"🇬🇷","Hungary":"🇭🇺","Iceland":"🇮🇸","Ireland":"🇮🇪",
  "Italy":"🇮🇹","Latvia":"🇱🇻","Lithuania":"🇱🇹","Luxembourg":"🇱🇺",
  "Malta":"🇲🇹","Moldova":"🇲🇩","Montenegro":"🇲🇪","Netherlands":"🇳🇱",
  "North Macedonia":"🇲🇰","Norway":"🇳🇴","Poland":"🇵🇱","Portugal":"🇵🇹","Romania":"🇷🇴",
  "Russia":"🇷🇺","Serbia":"🇷🇸","Slovakia":"🇸🇰","Slovenia":"🇸🇮",
  "Spain":"🇪🇸","Sweden":"🇸🇪","Switzerland":"🇨🇭","Ukraine":"🇺🇦","United Kingdom":"🇬🇧",
  "Kosovo":"🇽🇰"
};

const UI = {
  en: {
    title: "🌍 Europe Explorer",
    find: "Find:",
    correct: "✅ Correct:",
    attempts: "🎯 Attempts:",
    streak: "🔥 Streak:",
    next: "Next Country →",
    loading: "Loading map…",
    langFlag: "🇸🇪", langLabel: "Svenska",
    ok: ["🎉 Correct! Well done!", "⭐ Nailed it!", "🌟 Amazing!", "🎯 Spot on!", "👏 Brilliant!"],
    no: ["🤔 Not quite — try again!", "👀 Keep looking!", "🗺️ Hmm, not there!"]
  },
  sv: {
    title: "🌍 Europautforskaren",
    find: "Hitta:",
    correct: "✅ Rätt:",
    attempts: "🎯 Försök:",
    streak: "🔥 Svit:",
    next: "Nästa land →",
    loading: "Laddar karta…",
    langFlag: "🇬🇧", langLabel: "English",
    ok: ["🎉 Rätt! Bra jobbat!", "⭐ Perfekt!", "🌟 Fantastiskt!", "🎯 Pricksäkert!", "👏 Bravo!"],
    no: ["🤔 Inte riktigt — försök igen!", "👀 Leta vidare!", "🗺️ Hmm, inte där!"]
  }
};

let lang = "en";
let current = null, correctCount = 0, attempts = 0, streak = 0;
let found = new Set(), answered = false;
let countryPaths = {};

function toggleLang() {
  lang = lang === "en" ? "sv" : "en";
  applyUI();
  if (current) {
    const displayName = lang === "sv" ? (SV[current.name] || current.name) : current.name;
    document.getElementById("country-el").textContent = displayName;
  }
}

function applyUI() {
  const t = UI[lang];
  document.getElementById("title").textContent = t.title;
  document.getElementById("find-label").textContent = t.find;
  document.getElementById("lbl-correct").textContent = t.correct;
  document.getElementById("lbl-attempts").textContent = t.attempts;
  document.getElementById("lbl-streak").textContent = t.streak;
  document.getElementById("next-btn").textContent = t.next;
  document.getElementById("lang-flag").textContent = t.langFlag;
  document.getElementById("lang-label").textContent = t.langLabel;
  document.getElementById("feedback").textContent = "";
}

async function init() {
  const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json");
  const countries = topojson.feature(world, world.objects.countries);
  const europeFeatures = countries.features.filter(f => EUROPE_COUNTRIES[f.id]);

  const mapWrap = document.getElementById("map-wrap");
  mapWrap.innerHTML = "";

  const W = 860, H = 620;
  const svg = d3.select(mapWrap).append("svg").attr("viewBox", `0 0 ${W} ${H}`);

  const projection = d3.geoMercator()
    .center([15, 54]).scale(680).translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);

  svg.append("rect").attr("width", W).attr("height", H).attr("fill", "#b8d8f0");

  svg.selectAll(".country")
    .data(europeFeatures).enter().append("path")
    .attr("class", "country")
    .attr("d", path)
    .attr("id", d => "c-" + d.id)
    .attr("data-name", d => EUROPE_COUNTRIES[d.id])
    .on("click", function(event, d) {
      handleClick(d.id, EUROPE_COUNTRIES[d.id], this);
    });

  europeFeatures.forEach(f => {
    countryPaths[EUROPE_COUNTRIES[f.id]] = document.getElementById("c-" + f.id);
  });

  nextCountry();
}

function handleClick(id, englishName, el) {
  if (answered) return;
  attempts++;
  document.getElementById("sa").textContent = attempts;

  if (englishName === current.name) {
    answered = true;
    correctCount++;
    streak++;
    found.add(current.name);
    document.getElementById("sc").textContent = correctCount;
    document.getElementById("ss").textContent = streak;
    el.classList.add("found");
    const msgs = UI[lang].ok;
    setFeedback(msgs[Math.floor(Math.random() * msgs.length)], "ok");
    setTimeout(() => document.getElementById("next-btn").style.display = "inline-block", 500);
  } else {
    streak = 0;
    document.getElementById("ss").textContent = 0;
    el.classList.add("wrong-flash");
    setTimeout(() => el.classList.remove("wrong-flash"), 650);
    const msgs = UI[lang].no;
    setFeedback(msgs[Math.floor(Math.random() * msgs.length)], "no");
  }
}

function setFeedback(msg, cls) {
  const fb = document.getElementById("feedback");
  fb.textContent = msg;
  fb.className = cls;
}

function nextCountry() {
  answered = false;
  document.getElementById("next-btn").style.display = "none";
  setFeedback("", "");

  const all = Object.values(EUROPE_COUNTRIES);
  const remaining = all.filter(n => !found.has(n) && countryPaths[n]);
  if (remaining.length === 0) {
    found.clear();
    Object.values(countryPaths).forEach(el => { if (el) el.classList.remove("found"); });
    nextCountry(); return;
  }

  const name = remaining[Math.floor(Math.random() * remaining.length)];
  current = { name };
  document.getElementById("flag-el").textContent = FLAGS[name] || "🏳️";
  document.getElementById("country-el").textContent = lang === "sv" ? (SV[name] || name) : name;
}

applyUI();
init().catch(e => {
  document.getElementById("loading").textContent = "Error loading map: " + e.message;
});
</script>
</body>
</html>
